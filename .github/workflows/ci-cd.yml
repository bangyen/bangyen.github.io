name: CI/CD

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: write
    id-token: write
    pages: write

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
                  cache: 'bun'
            - name: Install dependencies
              run: bun install --frozen-lockfile
            - name: Run Linting
              run: bun run lint:all

    type-check:
        name: Type Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
                  cache: 'bun'
            - name: Install dependencies
              run: bun install --frozen-lockfile
            - name: Run Type Check
              run: bun run type-check

    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
                  cache: 'bun'
            - name: Install dependencies
              run: bun install --frozen-lockfile
            - name: Run Tests
              run: bun run test

    build:
        name: Build
        needs: [lint, type-check, test]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
                  cache: 'bun'
            - name: Install dependencies
              run: bun install --frozen-lockfile
            - name: Build
              run: bun run build
            - name: Upload Build Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: build-output
                  path: build/
                  retention-days: 1

    deploy:
        name: Deploy
        needs: build
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4
            - name: Download Build Artifact
              uses: actions/download-artifact@v4
              with:
                  name: build-output
                  path: ./build
            - name: Deploy to GitHub Pages
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./build
